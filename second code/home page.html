<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chase Autos</title>
  <style>
    /* 🌈 Color Palette */
    :root {
      --primary-color: #1f2937;      /* Dark navy for header/footer */
      --accent-color: #fbbf24;       /* Warm yellow for highlights */
      --background-color: #f9fafb;   /* Light gray background */
      --text-color: #111827;         /* Dark text */
      --card-bg: #ffffff;            /* White cards */
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--background-color);
      color: var(--text-color);
    }

    /* 🧭 Navigation Bar */
    header {
      background-color: var(--primary-color);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      margin-left: 1.5rem;
      text-decoration: none;
      font-weight: bold;
    }

    /* 🖼 Hero Banner */
    .hero {
      background-color: var(--accent-color);
      padding: 3rem 2rem;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
    }

    /* 🔍 Search Bar */
    .search-bar {
      padding: 1rem 2rem;
      text-align: center;
    }

    .search-bar input {
      padding: 0.5rem;
      width: 60%;
      max-width: 500px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    /* 🚗 Featured Listings */
    .featured-listings {
      padding: 2rem;
      display: flex;
      justify-content: space-around;
      gap: 1rem;
    }

    .car-card {
      background-color: var(--card-bg);
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      width: 30%;
      text-align: center;
    }

    .car-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 5px;
      background-color: #ddd;
    }

    /* 💡 Why Choose Us */
    .why-choose {
      background-color: #e5e7eb;
      padding: 2rem;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }

    .why-item {
      width: 30%;
    }

    /* 📎 Footer */
    footer {
      background-color: var(--primary-color);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .social-icons span {
      margin-right: 1rem;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <!-- 🧭 Navigation -->
  <header>
    <div><strong>CHASE AUTOS🛠🏎</strong></div>
    <nav>
      <a href="home page.html">Home</a>
      <a href="inventory.html">Inventory</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- 🖼 Hero Banner -->
  <div class="hero">
    FEATURED CAR 
  </div>

  <!-- 🔍 Search Bar -->
  <div class="search-bar">
    <input type="text" placeholder="Search by Make, Model, Year, Price" />
  </div>

  <!-- 🚗 Featured Listings -->
  <section class="featured-listings">
    <div class="car-card">
      <img src="first car.jpg" alt="">
      <p><strong>$18.7million USD </strong></p>
      <p>Bugatti La Voiture Noire</p>
      <p><a href="firstcar.html">View More</a></p>
    </div>
    <div class="car-card">
      <img src="secondcar.jpg" alt="">
      <p><strong>$10.4million USD</strong></p>
      <p>Pagani Huayra</p>
      <p><a href="secondcar.html">View More</a></p>
      
    </div>
    <div class="car-card">
      <img src="thirdcar2.jpg" alt="">
      <p><strong>$400,000 USD</strong></p>
      <p></p>Rolls-Royce Ghost(2021+)
      <p><a href="thirdcar.html">View More</a></p>
    </div>
  </section>

  <!-- 💡 Why Choose Us -->
  <section class="why-choose">
    <div class="why-item">
      <p>🛡</p>
      <p><strong>Trusted Dealer</strong></p>
    </div>
    <div class="why-item">
      <p>👍</p>
      <p><strong>Affordable Price</strong></p>
    </div>
    <div class="why-item">
      <p>❤</p>
      <p><strong>Warranty</strong></p>
    </div>
  </section>

  <!-- 📎 Footer -->
  <footer>
    <div class="social-icons">
      <span>🔵</span>
      <span>🟣</span>
      <span>🔴</span>
    </div>
    <div>Subscribe to our newsletter</div>
  </footer>

</body>
</html>
